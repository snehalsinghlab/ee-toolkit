<!DOCTYPE html>
<html>
<head>
  <title>EE Survival Toolkit</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    header {
      text-align: center;
      padding: 20px;
      background: #020617;
    }

    .container {
      max-width: 450px;
      margin: 20px auto;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
    }

    select, input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
    }

    input {
      background: white;
      color: black;
    }

    button {
      background: #22c55e;
      font-weight: bold;
      cursor: pointer;
    }

    h3 {
      margin-top: 15px;
    }

    .box {
      margin-top: 15px;
      padding: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>⚡ EE Survival Toolkit</h1>
  <p>Solve numericals faster than ever</p>
</header>

<div class="container">

  <h3>🔢 Numerical Solver</h3>
  <input id="v" type="number" placeholder="Voltage (V)">
  <input id="r" type="number" placeholder="Resistance (Ω)">
  <button onclick="solve()">Solve</button>

  <div class="box" id="solverResult"></div>

  <h3>⚡ What Formula to Use?</h3>

  <select id="given">
    <option value="VR">Given: V & R</option>
    <option value="VI">Given: V & I</option>
    <option value="IR">Given: I & R</option>
  </select>

  <select id="find">
    <option value="I">Find Current (I)</option>
    <option value="V">Find Voltage (V)</option>
    <option value="R">Find Resistance (R)</option>
  </select>

  <button onclick="suggest()">Get Formula</button>

  <div class="box" id="formulaResult"></div>

  <h3>📚 Exam Mode</h3>
  <button onclick="generateQ()">Generate Question</button>
  <button onclick="showAns()">Show Answer</button>

  <div class="box" id="question"></div>
  <div class="box" id="answer"></div>

</div>

<script>

// 🔢 Numerical Solver
function solve(){
  let V = parseFloat(document.getElementById("v").value);
  let R = parseFloat(document.getElementById("r").value);

  if(isNaN(V) || isNaN(R)){
    solverResult.innerText = "Enter both values";
    return;
  }

  let I = V / R;

  solverResult.innerText =
    "Current = " + I.toFixed(2) + " A\n" +
    "Formula: I = V / R\n" +
    "Step: " + V + " / " + R + " = " + I.toFixed(2);
}


// ⚡ What to Use Helper
function suggest(){
  let g = given.value;
  let f = find.value;

  let text = "";

  if(g==="VR" && f==="I") text = "Use I = V / R";
  else if(g==="VI" && f==="R") text = "Use R = V / I";
  else if(g==="IR" && f==="V") text = "Use V = I × R";
  else text = "Invalid combination";

  formulaResult.innerText = text;
}


// 📚 Exam Mode
let currentQ = {};
function generateQ(){
  let V = Math.floor(Math.random()*100)+10;
  let R = Math.floor(Math.random()*10)+1;

  currentQ.V = V;
  currentQ.R = R;
  currentQ.I = V / R;

  question.innerText = "Find Current if V=" + V + "V and R=" + R + "Ω";
  answer.innerText = "";
}

function showAns(){
  if(!currentQ.I){
    answer.innerText = "Generate question first";
    return;
  }

  answer.innerText =
    "I = " + currentQ.I.toFixed(2) + " A\n" +
    "Formula: I = V / R\n" +
    "Step: " + currentQ.V + "/" + currentQ.R;
}

</script>

</body>
</html>
