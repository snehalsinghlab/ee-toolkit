<!DOCTYPE html>
<html>
<head>
  <title>EE Toolkit Game</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    header {
      text-align: center;
      padding: 20px;
      background: #020617;
    }

    .container {
      max-width: 420px;
      margin: 20px auto;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: white;
      color: black;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin-top: 10px;
      white-space: pre-line;
    }

    .stats {
      margin-top: 10px;
      font-size: 14px;
      color: #a5b4fc;
    }

    .box {
      margin-top: 20px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
    }
  </style>
</head>

<body>

<header>
  <h1>⚡ EE Toolkit Game</h1>
</header>

<div class="container">

  <div class="stats">
    Score: <span id="score">0</span> |
    Streak: <span id="streak">0</span> |
    Level: <span id="level">Beginner</span>
  </div>

  <select id="mode">
    <option value="I">Current (V/R)</option>
    <option value="V">Voltage (I×R)</option>
    <option value="R">Resistance (V/I)</option>

    <option value="P">Power (V×I)</option>
    <option value="P1">Power (I²R)</option>
    <option value="P2">Power (V²/R)</option>

    <option value="E">Energy (J)</option>
    <option value="Ek">Energy (kWh)</option>
    <option value="Q">Charge</option>

    <option value="RS">Series Resistance</option>
    <option value="RP">Parallel Resistance</option>

    <option value="U">Convert W → kW</option>
  </select>

  <input id="value1" type="number" placeholder="Value 1">
  <input id="value2" type="number" placeholder="Value 2">

  <button onclick="calculate()">Calculate</button>

  <h3 id="result"></h3>

  <div class="box">
    <h3>🎯 Challenge</h3>
    <button onclick="generateChallenge()">New Challenge</button>
    <p id="question"></p>
    <input id="answer" placeholder="Your answer">
    <button onclick="checkAnswer()">Submit</button>
  </div>

  <div class="box">
    <h3>🏆 Leaderboard</h3>
    <button onclick="saveScore()">Save Score</button>
    <div id="leaderboard"></div>
  </div>

</div>

<script>
let score = 0;
let streak = 0;
let correctAnswer = 0;

// LOAD
if(localStorage.getItem("score")){
  score = parseInt(localStorage.getItem("score"));
  streak = parseInt(localStorage.getItem("streak"));
}

function saveProgress(){
  localStorage.setItem("score", score);
  localStorage.setItem("streak", streak);
}

function updateStats(){
  scoreEl.innerText = score;
  streakEl.innerText = streak;

  let level = "Beginner";
  if(score > 50) level = "Learner";
  if(score > 150) level = "Pro";

  levelEl.innerText = level;

  saveProgress();
}

// CALCULATOR (FULL + UNITS)
function calculate(){
  let m = mode.value;
  let v1 = parseFloat(value1.value);
  let v2 = parseFloat(value2.value);

  if(m !== "U" && (isNaN(v1) || isNaN(v2))){
    result.innerText = "Enter values";
    return;
  }

  let r, unit="";

  if(m==="I"){ r=v1/v2; unit="A"; }
  else if(m==="V"){ r=v1*v2; unit="V"; }
  else if(m==="R"){ r=v1/v2; unit="Ω"; }

  else if(m==="P"){ r=v1*v2; unit="W"; }
  else if(m==="P1"){ r=v1*v1*v2; unit="W"; }
  else if(m==="P2"){ r=(v1*v1)/v2; unit="W"; }

  else if(m==="E"){ r=v1*v2; unit="J"; }
  else if(m==="Ek"){ r=(v1*v2)/1000; unit="kWh"; }
  else if(m==="Q"){ r=v1*v2; unit="C"; }

  else if(m==="RS"){ r=v1+v2; unit="Ω"; }
  else if(m==="RP"){ r=(v1*v2)/(v1+v2); unit="Ω"; }

  else if(m==="U"){ r=v1/1000; unit="kW"; }

  r = Math.round(r*100)/100;

  result.innerText = "Result = " + r + " " + unit;

  score += 10;
  streak += 1;

  updateStats();
}

// CHALLENGE
function generateChallenge(){
  let v = Math.floor(Math.random()*20)+1;
  let r = Math.floor(Math.random()*10)+1;

  correctAnswer = v/r;

  question.innerText = "Find Current: V="+v+"V, R="+r+"Ω";
}

function checkAnswer(){
  let user = parseFloat(answer.value);

  if(Math.abs(user - correctAnswer) < 0.1){
    alert("Correct!");
    score += 20;
    streak += 1;
  } else {
    alert("Wrong!");
    streak = 0;
  }

  updateStats();
}

// LEADERBOARD
function saveScore(){
  let name = prompt("Enter your name:");
  if(!name) return;

  let data = JSON.parse(localStorage.getItem("leaderboard")) || [];

  data.push({name, score});
  data.sort((a,b)=>b.score-a.score);

  localStorage.setItem("leaderboard", JSON.stringify(data));
  showLeaderboard();
}

function showLeaderboard(){
  let data = JSON.parse(localStorage.getItem("leaderboard")) || [];

  let html = "";
  data.slice(0,5).forEach((p,i)=>{
    html += "<p>"+(i+1)+". "+p.name+" - "+p.score+"</p>";
  });

  leaderboard.innerHTML = html;
}

let scoreEl = document.getElementById("score");
let streakEl = document.getElementById("streak");
let levelEl = document.getElementById("level");
let leaderboard = document.getElementById("leaderboard");

updateStats();
showLeaderboard();
</script>

</body>
</html>
