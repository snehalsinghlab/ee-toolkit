<!DOCTYPE html>
<html>
<head>
<title>EE Toolkit</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

.logo{
  font-weight:bold;
  font-size:18px;
}

.nav-links a{
  margin-left:15px;
  color:white;
  text-decoration:none;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:32px;
}

.hero p{
  color:#94a3b8;
}

/* BUTTONS */
.btn{
  display:inline-block;
  margin:10px;
  padding:12px 18px;
  border-radius:10px;
  background:linear-gradient(135deg,#22c55e,#4ade80);
  color:black;
  text-decoration:none;
  font-weight:bold;
}

/* SECTIONS */
.section{
  max-width:900px;
  margin:40px auto;
  padding:20px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.card{
  padding:20px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  text-align:center;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">⚡ EE Toolkit</div>
  <div class="nav-links">
    <a href="index.html">Home</a>

    <a href="practice.html">Practice</a>
    <a href="challenge.html">Challenge</a>
    <a href="tools.html">Tools</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Your Electrical Engineering Companion</h1>
  <p>Solve numericals • Learn formulas • Practice like exam</p>

  <a href="calculations.html" class="btn">Start Calculating</a>
  <a href="practice.html" class="btn">Practice Now</a>
</div>

<!-- FEATURES -->
<div class="section">
  <h2>🚀 What You Get</h2>

  <div class="cards">
    <div class="card">🔢 Smart Calculations</div>
    <div class="card">🧠 Formula Helper</div>
