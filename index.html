<!DOCTYPE html>
<html>
<head>
  <title>EE Toolkit | Smart Calculators</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    header {
      text-align: center;
      padding: 20px;
      background: #020617;
    }

    .container {
      max-width: 420px;
      margin: 20px auto;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: white;
      color: black;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin-top: 10px;
      white-space: pre-line;
    }

    .steps {
      margin-top: 10px;
      font-size: 14px;
      color: #a5b4fc;
    }
  </style>
</head>

<body>

<header>
  <h1>⚡ EE Toolkit</h1>
  <p>All-in-one Electrical Calculator</p>
</header>

<div class="container">

  <select id="mode" onchange="updateUI()">
    <option value="I">Current (V/R)</option>
    <option value="V">Voltage (I×R)</option>
    <option value="R">Resistance (V/I)</option>

    <option value="P">Power (V×I)</option>
    <option value="P1">Power (I²R)</option>
    <option value="P2">Power (V²/R)</option>

    <option value="E">Energy (J)</option>
    <option value="Ek">Energy (kWh)</option>
    <option value="Q">Charge</option>

    <option value="RS">Series Resistance</option>
    <option value="RP">Parallel Resistance</option>

    <option value="Bill">Electricity Bill ⚡</option>
    <option value="Wire">Wire Current Capacity 🔌</option>
    <option value="Trans">Transformer 🔄</option>
    <option value="Unit">Unit Converter 🔁</option>
  </select>

  <input id="value1" type="number" placeholder="Value 1">
  <input id="value2" type="number" placeholder="Value 2">

  <button onclick="calculate()">Calculate</button>
  <button onclick="toggleExam()">🎯 Exam Mode</button>

  <h3 id="result"></h3>
  <div class="steps" id="steps"></div>

</div>

<script>
let examMode = false;

function toggleExam(){
  examMode = !examMode;
  alert(examMode ? "Exam Mode ON" : "Exam Mode OFF");
}

function calculate(){
  let m = mode.value;
  let v1 = parseFloat(value1.value);
  let v2 = parseFloat(value2.value);

  if(isNaN(v1)){
    result.innerText = "Enter values";
    return;
  }

  let r, unit="", formula="", steps="";

  if(m==="I"){ r=v1/v2; unit="A"; formula="I=V/R"; steps=`${v1}/${v2}`; }
  else if(m==="V"){ r=v1*v2; unit="V"; formula="V=I×R"; steps=`${v1}×${v2}`; }
  else if(m==="R"){ r=v1/v2; unit="Ω"; formula="R=V/I"; steps=`${v1}/${v2}`; }

  else if(m==="P"){ r=v1*v2; unit="W"; formula="P=VI"; steps=`${v1}×${v2}`; }
  else if(m==="P1"){ r=v1*v1*v2; unit="W"; formula="P=I²R"; steps=`${v1}²×${v2}`; }
  else if(m==="P2"){ r=(v1*v1)/v2; unit="W"; formula="P=V²/R"; steps=`${v1}²/${v2}`; }

  else if(m==="E"){ r=v1*v2; unit="J"; formula="E=Pt"; steps=`${v1}×${v2}`; }
  else if(m==="Ek"){ r=(v1*v2)/1000; unit="kWh"; formula="E=(Pt)/1000"; steps=`(${v1}×${v2})/1000`; }
  else if(m==="Q"){ r=v1*v2; unit="C"; formula="Q=It"; steps=`${v1}×${v2}`; }

  else if(m==="RS"){ r=v1+v2; unit="Ω"; formula="R=R1+R2"; steps=`${v1}+${v2}`; }
  else if(m==="RP"){ r=(v1*v2)/(v1+v2); unit="Ω"; formula="R=(R1R2)/(R1+R2)"; steps=`(${v1}×${v2})/(${v1}+${v2})`; }

  else if(m==="Bill"){ r=v1*v2; unit="₹"; formula="Bill=Units×Cost"; steps=`${v1}×${v2}`; }

  else if(m==="Wire"){ r=v1*5; unit="A"; formula="Approx: 1mm² ≈ 5A"; steps=`${v1}×5`; }

  else if(m==="Trans"){ r=v1/v2; unit="ratio"; formula="V1/V2=N1/N2"; steps=`${v1}/${v2}`; }

  else if(m==="Unit"){
    r = v1/1000;
    unit="k (converted)";
    formula="Divide by 1000";
    steps=`${v1}/1000`;
  }

  r = Math.round(r*100)/100;

  if(examMode){
    result.innerText="Think first, click again";
    examMode=false;
  } else {
    result.innerText="Result = "+r+" "+unit;
    stepsEl.innerText="Formula: "+formula+"\nStep: "+steps;
  }
}

function updateUI(){
  let m = mode.value;

  if(m==="Bill"){
    value1.placeholder="Units";
    value2.placeholder="Cost/unit";
  }
  else if(m==="Wire"){
    value1.placeholder="Wire size (mm²)";
    value2.style.display="none";
  }
  else if(m==="Unit"){
    value1.placeholder="Enter value";
    value2.style.display="none";
  }
  else{
    value1.placeholder="Value 1";
    value2.placeholder="Value 2";
    value2.style.display="block";
  }
}

let stepsEl=document.getElementById("steps");
</script>

</body>
</html>
