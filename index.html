<!DOCTYPE html>
<html>
<head>
  <title>EE Toolkit</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .container {
      background: rgba(255, 255, 255, 0.08);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      width: 320px;
      text-align: center;
    }

    select, input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.15);
    }

    /* FIX DROPDOWN VISIBILITY */
    select {
      color: black;
      background: rgba(255, 255, 255, 0.9);
    }

    option {
      color: black;
      background: white;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #22c55e, #4ade80);
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>⚡ EE Toolkit</h2>

  <select id="mode" onchange="updateUI()">
    <option value="I">Current (V / R)</option>
    <option value="V">Voltage (I × R)</option>
    <option value="R">Resistance (V / I)</option>

    <option value="P">Power (V × I)</option>
    <option value="P1">Power (I²R)</option>
    <option value="P2">Power (V²/R)</option>

    <option value="E">Energy (Joules)</option>
    <option value="Ek">Energy (kWh)</option>
    <option value="Q">Charge</option>

    <option value="RS">Series Resistance</option>
    <option value="RP">Parallel Resistance</option>

    <option value="U">Convert W → kW</option>
  </select>

  <br><br>

  <label id="label1">Value 1</label>
  <input type="number" id="value1">

  <br><br>

  <label id="label2">Value 2</label>
  <input type="number" id="value2">

  <br><br>

  <button onclick="calculate()">Calculate</button>

  <h3 id="result"></h3>

</div>

<script>
function calculate() {
  let mode = document.getElementById("mode").value;
  let val1 = parseFloat(document.getElementById("value1").value);
  let val2 = parseFloat(document.getElementById("value2").value);

  if (mode !== "U" && (isNaN(val1) || isNaN(val2))) {
    return show("Please enter valid numbers");
  }

  if (mode === "U" && isNaN(val1)) {
    return show("Enter a valid number");
  }

  let result;

  if (mode === "I") {
    if (val2 === 0) return show("Resistance cannot be zero");
    result = val1 / val2;
    show("Current = " + result + " A");
  }

  else if (mode === "V") {
    result = val1 * val2;
    show("Voltage = " + result + " V");
  }

  else if (mode === "R") {
    if (val2 === 0) return show("Current cannot be zero");
    result = val1 / val2;
    show("Resistance = " + result + " Ω");
  }

  else if (mode === "P") {
    result = val1 * val2;
    show("Power = " + result + " W");
  }

  else if (mode === "P1") {
    result = val1 * val1 * val2;
    show("Power = " + result + " W");
  }

  else if (mode === "P2") {
    if (val2 === 0) return show("Resistance cannot be zero");
    result = (val1 * val1) / val2;
    show("Power = " + result + " W");
  }

  else if (mode === "E") {
    result = val1 * val2;
    show("Energy = " + result + " J");
  }

  else if (mode === "Ek") {
    result = (val1 * val2) / 1000;
    show("Energy = " + result + " kWh");
  }

  else if (mode === "Q") {
    result = val1 * val2;
    show("Charge = " + result + " C");
  }

  else if (mode === "RS") {
    result = val1 + val2;
    show("Total Resistance = " + result + " Ω");
  }

  else if (mode === "RP") {
    if (val1 + val2 === 0) return show("Invalid values");
    result = (val1 * val2) / (val1 + val2);
    show("Total Resistance = " + result + " Ω");
  }

  else if (mode === "U") {
    result = val1 / 1000;
    show("Power = " + result + " kW");
  }
}

function updateUI() {
  let mode = document.getElementById("mode").value;

  let label1 = document.getElementById("label1");
  let label2 = document.getElementById("label2");
  let input2 = document.getElementById("value2");

  input2.style.display = "block";
  label2.style.display = "block";

  if (mode === "I") {
    label1.innerText = "Voltage (V)";
    label2.innerText = "Resistance (Ω)";
  }

  else if (mode === "V") {
    label1.innerText = "Current (A)";
    label2.innerText = "Resistance (Ω)";
  }

  else if (mode === "R") {
    label1.innerText = "Voltage (V)";
    label2.innerText = "Current (A)";
  }

  else if (mode === "P") {
    label1.innerText = "Voltage (V)";
    label2.innerText = "Current (A)";
  }

  else if (mode === "P1") {
    label1.innerText = "Current (A)";
    label2.innerText = "Resistance (Ω)";
  }

  else if (mode === "P2") {
    label1.innerText = "Voltage (V)";
    label2.innerText = "Resistance (Ω)";
  }

  else if (mode === "E") {
    label1.innerText = "Power (W)";
    label2.innerText = "Time (s)";
  }

  else if (mode === "Ek") {
    label1.innerText = "Power (W)";
    label2.innerText = "Time (hours)";
  }

  else if (mode === "Q") {
    label1.innerText = "Current (A)";
    label2.innerText = "Time (s)";
  }

  else if (mode === "RS") {
    label1.innerText = "R1 (Ω)";
    label2.innerText = "R2 (Ω)";
  }

  else if (mode === "RP") {
    label1.innerText = "R1 (Ω)";
    label2.innerText = "R2 (Ω)";
  }

  else if (mode === "U") {
    label1.innerText = "Power (W)";
    input2.style.display = "none";
    label2.style.display = "none";
  }
}

updateUI();

function show(text) {
  document.getElementById("result").innerText = text;
}
</script>

</body>
</html>
