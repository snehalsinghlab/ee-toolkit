<!DOCTYPE html>
<html>
<head>
  <title>EE Calculator Gamified</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    header {
      text-align: center;
      padding: 20px;
      background: #020617;
    }

    .container {
      max-width: 400px;
      margin: 20px auto;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: white;
      color: black;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin-top: 10px;
      white-space: pre-line;
    }

    .stats {
      margin-top: 10px;
      font-size: 14px;
      color: #a5b4fc;
    }

    .challenge {
      margin-top: 20px;
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>⚡ EE Calculator Game</h1>
</header>

<div class="container">

  <div class="stats">
    Score: <span id="score">0</span> |
    Streak: <span id="streak">0</span> |
    Level: <span id="level">Beginner</span>
  </div>

  <select id="mode">
    <option value="I">Current</option>
    <option value="V">Voltage</option>
    <option value="R">Resistance</option>
  </select>

  <input id="value1" type="number" placeholder="Value 1">
  <input id="value2" type="number" placeholder="Value 2">

  <button onclick="calculate()">Calculate</button>

  <h3 id="result"></h3>

  <div class="challenge">
    <button onclick="generateChallenge()">🎯 Challenge Me</button>
    <p id="question"></p>
    <input id="answer" placeholder="Your answer">
    <button onclick="checkAnswer()">Submit</button>
  </div>

</div>

<script>
let score = 0;
let streak = 0;
let correctAnswer = 0;

function updateStats(){
  scoreEl.innerText = score;
  streakEl.innerText = streak;

  let level = "Beginner";
  if(score > 50) level = "Learner";
  if(score > 150) level = "Pro";

  levelEl.innerText = level;
}

function calculate(){
  let v1 = parseFloat(value1.value);
  let v2 = parseFloat(value2.value);
  let m = mode.value;

  if(isNaN(v1) || isNaN(v2)){
    result.innerText = "Enter values";
    return;
  }

  let r;

  if(m==="I") r = v1/v2;
  if(m==="V") r = v1*v2;
  if(m==="R") r = v1/v2;

  r = Math.round(r*100)/100;

  result.innerText = "Result = " + r;

  score += 10;
  streak += 1;

  updateStats();
}

function generateChallenge(){
  let v = Math.floor(Math.random()*10)+1;
  let r = Math.floor(Math.random()*10)+1;

  correctAnswer = v/r;

  question.innerText = "Find Current: V="+v+"V, R="+r+"Ω";
}

function checkAnswer(){
  let user = parseFloat(answer.value);

  if(Math.abs(user - correctAnswer) < 0.1){
    alert("Correct!");
    score += 20;
    streak += 1;
  } else {
    alert("Wrong!");
    streak = 0;
  }

  updateStats();
}

let scoreEl = document.getElementById("score");
let streakEl = document.getElementById("streak");
let levelEl = document.getElementById("level");

updateStats();
</script>

</body>
</html>
