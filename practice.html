<!DOCTYPE html>
<html>
<head>
<title>Practice - EE Toolkit</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:#0f172a;
  color:white;
}

.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:rgba(255,255,255,0.05);
}

.nav-links a{
  margin-left:15px;
  color:white;
  text-decoration:none;
}

.container{
  padding:20px;
  text-align:center;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

input, select{
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  margin-top:10px;
  cursor:pointer;
}

.result{
  margin-top:15px;
  padding:10px;
  background:#020617;
  border-radius:8px;
}
</style>

</head>

<body>

<div class="navbar">
  <div>⚡ EE Toolkit</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="calculations.html">Calculations</a>
    <a href="practice.html">Practice</a>
    <a href="challenge.html">Challenge</a>
    <a href="tools.html">Tools</a>
  </div>
</div>

<div class="container">

<h2>📚 Practice Mode</h2>

<div class="card">

<select id="topic">
  <option value="mixed">Mixed</option>
  <option value="ohm">Ohm's Law</option>
  <option value="power">Power</option>
  <option value="energy">Energy</option>
</select>

<select id="difficulty">
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard">Hard</option>
</select>

<h3 id="question">Click Start</h3>

<input id="answer" placeholder="Enter answer">

<br>

<button onclick="start()">Start</button>
<button onclick="check()">Submit</button>
<button onclick="nextQ()">Next</button>

<div class="result" id="feedback"></div>

</div>

<div class="card">
  <h3>🏆 Stats</h3>
  <p>Score: <span id="score">0</span></p>
  <p>Streak: <span id="streak">0</span></p>
  <p>High Score: <span id="high">0</span></p>
  <p>⏱ Time Left: <span id="time">30</span>s</p>
</div>

</div>

<script>

let score=0, streak=0, high=0;
let currentAnswer=0;
let timer=30;
let interval;

function start(){
score=0;
streak=0;
timer=30;
updateStats();
nextQ();

clearInterval(interval);
interval=setInterval(()=>{
timer--;
document.getElementById("time").innerText=timer;

if(timer<=0){
clearInterval(interval);
feedback.innerText="⏰ Time's up!";
}
},1000);
}

function nextQ(){

let topic=document.getElementById("topic").value;
let diff=document.getElementById("difficulty").value;

let range = diff==="easy"?10:diff==="medium"?50:100;

let q,a;

if(topic==="ohm" || topic==="mixed"){
let V=Math.floor(Math.random()*range)+10;
let R=Math.floor(Math.random()*10)+1;
a=V/R;
q=`Find Current: V=${V}V, R=${R}Ω`;
}

if(topic==="power"){
let V=Math.floor(Math.random()*range)+10;
let I=Math.floor(Math.random()*10)+1;
a=V*I;
q=`Find Power: V=${V}V, I=${I}A`;
}

if(topic==="energy"){
let P=Math.floor(Math.random()*range)+50;
let t=Math.floor(Math.random()*5)+1;
a=P*t;
q=`Find Energy: P=${P}W, t=${t}hr`;
}

currentAnswer=a.toFixed(2);

question.innerText=q;
feedback.innerText="";
answer.value="";
}

function check(){
let user=parseFloat(answer.value);

if(isNaN(user)){
feedback.innerText="Enter valid number";
return;
}

if(Math.abs(user-currentAnswer)<0.1){
score++;
streak++;
if(score>high) high=score;
feedback.innerText="✅ Correct!";
}
else{
streak=0;
feedback.innerText=`❌ Wrong! Correct: ${currentAnswer}`;
}

updateStats();
}

function updateStats(){
document.getElementById("score").innerText=score;
document.getElementById("streak").innerText=streak;
document.getElementById("high").innerText=high;
}

</script>

</body>
</html>
