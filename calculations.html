<!DOCTYPE html>
<html>
<head>
<title>EE Calculations</title>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  padding:20px;
}

h2{
  text-align:center;
}

.section{
  margin-top:25px;
  padding:15px;
  background:#1e293b;
  border-radius:10px;
}

input, select, button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}

.box{
  margin-top:10px;
  padding:10px;
  background:#020617;
  border-radius:8px;
  white-space:pre-line;
}
</style>

</head>
<body>

<h2>⚡ Electrical Engineering Calculations</h2>

<!-- BASIC -->
<div class="section">
<h3>🔌 Basic (Ohm + Power)</h3>

<select id="basicMode">
<option value="I">Current (I = V/R)</option>
<option value="V">Voltage (V = IR)</option>
<option value="R">Resistance (R = V/I)</option>
<option value="P">Power (P = VI)</option>
<option value="P1">Power (P = I²R)</option>
<option value="P2">Power (P = V²/R)</option>
</select>

<input id="b1" placeholder="Value 1">
<input id="b2" placeholder="Value 2">

<button onclick="calcBasic()">Calculate</button>
<div class="box" id="basicRes"></div>
</div>

<!-- ENERGY -->
<div class="section">
<h3>⚡ Energy</h3>

<input id="power" placeholder="Power (W)">
<input id="time" placeholder="Time (hours)">

<button onclick="energy()">Calculate Energy</button>
<div class="box" id="energyRes"></div>
</div>

<!-- RESISTANCE -->
<div class="section">
<h3>🔗 Resistance</h3>

<select id="resMode">
<option value="series">Series</option>
<option value="parallel">Parallel</option>
</select>

<input id="r1" placeholder="R1">
<input id="r2" placeholder="R2">

<button onclick="resCalc()">Calculate</button>
<div class="box" id="resOut"></div>
</div>

<!-- EFFICIENCY -->
<div class="section">
<h3>⚙️ Efficiency</h3>

<input id="out" placeholder="Output Power">
<input id="inp" placeholder="Input Power">

<button onclick="eff()">Calculate</button>
<div class="box" id="effRes"></div>
</div>

<!-- TRANSFORMER -->
<div class="section">
<h3>🔁 Transformer</h3>

<input id="v1" placeholder="Primary Voltage">
<input id="v2" placeholder="Secondary Voltage">

<button onclick="tr()">Calculate Ratio</button>
<div class="box" id="trRes"></div>
</div>

<!-- AC -->
<div class="section">
<h3>🌊 AC Power</h3>

<input id="acV" placeholder="Voltage (V)">
<input id="acI" placeholder="Current (A)">
<input id="pf" placeholder="Power Factor (0-1)">

<button onclick="ac()">Calculate Power</button>
<div class="box" id="acRes"></div>
</div>

<!-- THREE PHASE -->
<div class="section">
<h3>⚡ 3-Phase Power</h3>

<input id="tpV" placeholder="Voltage (V)">
<input id="tpI" placeholder="Current (A)">
<input id="tppf" placeholder="Power Factor">

<button onclick="three()">Calculate</button>
<div class="box" id="tpRes"></div>
</div>

<!-- MOTOR -->
<div class="section">
<h3>⚙️ Motor Power</h3>

<input id="torque" placeholder="Torque (Nm)">
<input id="speed" placeholder="Speed (RPM)">

<button onclick="motor()">Calculate</button>
<div class="box" id="motorRes"></div>
</div>

<!-- SMART HELPER -->
<div class="section">
<h3>🧠 Smart EE Solver</h3>

<label>Category:</label>
<select id="category" onchange="updateOptions()">
  <option value="basic">Basic</option>
  <option value="power">Power</option>
  <option value="eff">Efficiency</option>
  <option value="ac">AC</option>
  <option value="tr">Transformer</option>
</select>

<label>Given:</label>
<select id="given"></select>

<label>Find:</label>
<select id="find"></select>

<input id="sv1" placeholder="Value 1">
<input id="sv2" placeholder="Value 2">
<input id="pfSmart" placeholder="Power Factor (only for AC)">

<button onclick="smartSolve()">Solve Smart</button>

<div class="box" id="smartRes"></div>
</div>

<script>

// BASIC
function calcBasic(){
let m=basicMode.value;
let a=parseFloat(b1.value);
let b=parseFloat(b2.value);

if(isNaN(a)||isNaN(b)){basicRes.innerText="Enter values";return;}

let r,f,unit;

if(m==="I"){r=a/b;f="I=V/R";unit="A";}
if(m==="V"){r=a*b;f="V=IR";unit="V";}
if(m==="R"){r=a/b;f="R=V/I";unit="Ω";}
if(m==="P"){r=a*b;f="P=VI";unit="W";}
if(m==="P1"){r=a*a*b;f="P=I²R";unit="W";}
if(m==="P2"){r=(a*a)/b;f="P=V²/R";unit="W";}

basicRes.innerText=`Result: ${r.toFixed(2)} ${unit}\nFormula: ${f}`;
}

// ENERGY
function energy(){
let p=parseFloat(power.value);
let t=parseFloat(time.value);

if(isNaN(p)||isNaN(t)){energyRes.innerText="Enter values";return;}

let e=p*t;

energyRes.innerText=`Energy = ${e.toFixed(2)} Wh\n= ${(e/1000).toFixed(2)} kWh`;
}

// RESISTANCE
function resCalc(){
let m=resMode.value;
let a=parseFloat(r1.value);
let b=parseFloat(r2.value);

if(isNaN(a)||isNaN(b)){resOut.innerText="Enter values";return;}

let r = (m==="series") ? a+b : (a*b)/(a+b);

resOut.innerText=`R = ${r.toFixed(2)} Ω`;
}

// EFFICIENCY
function eff(){
let o=parseFloat(out.value);
let i=parseFloat(inp.value);

if(isNaN(o)||isNaN(i)){effRes.innerText="Enter values";return;}

let e=(o/i)*100;

effRes.innerText=`Efficiency = ${e.toFixed(2)} %`;
}

// TRANSFORMER
function tr(){
let a=parseFloat(v1.value);
let b=parseFloat(v2.value);

if(isNaN(a)||isNaN(b)){trRes.innerText="Enter values";return;}

let r=a/b;

trRes.innerText=`Ratio = ${r.toFixed(2)}\nV1/V2`;
}

// AC
function ac(){
let v=parseFloat(acV.value);
let i=parseFloat(acI.value);
let pfv=parseFloat(pf.value);

if(isNaN(v)||isNaN(i)||isNaN(pfv)){acRes.innerText="Enter values";return;}

let p=v*i*pfv;

acRes.innerText=`Power = ${p.toFixed(2)} W\nFormula: VIcosθ`;
}

// THREE PHASE
function three(){
let v=parseFloat(tpV.value);
let i=parseFloat(tpI.value);
let pfv=parseFloat(tppf.value);

if(isNaN(v)||isNaN(i)||isNaN(pfv)){tpRes.innerText="Enter values";return;}

let p=1.732*v*i*pfv;

tpRes.innerText=`Power = ${p.toFixed(2)} W\nFormula: √3VIcosθ`;
}

// MOTOR
function motor(){
let t=parseFloat(torque.value);
let n=parseFloat(speed.value);

if(isNaN(t)||isNaN(n)){motorRes.innerText="Enter values";return;}

let p=(2*Math.PI*n*t)/60;

motorRes.innerText=`Power = ${p.toFixed(2)} W\nFormula: 2πNT/60`;
}

// SMART HELPER
function updateOptions(){
let c=category.value;

if(c==="basic"){
given.innerHTML=`<option value="VI">V & I</option><option value="VR">V & R</option><option value="IR">I & R</option>`;
find.innerHTML=`<option value="P">Power</option><option value="I">Current</option><option value="V">Voltage</option><option value="R">Resistance</option>`;
}

if(c==="power"){
given.innerHTML=`<option value="VI">V & I</option><option value="IR">I & R</option><option value="VR">V & R</option>`;
find.innerHTML=`<option value="P">Power</option>`;
}

if(c==="eff"){
given.innerHTML=`<option value="eff">Output & Input</option>`;
find.innerHTML=`<option value="eff">Efficiency</option>`;
}

if(c==="ac"){
given.innerHTML=`<option value="ac">V & I</option>`;
find.innerHTML=`<option value="P">Power</option>`;
}

if(c==="tr"){
given.innerHTML=`<option value="tr">V1 & V2</option>`;
find.innerHTML=`<option value="ratio">Ratio</option>`;
}
}

updateOptions();

function smartSolve(){
let c=category.value;
let g=given.value;

let a=parseFloat(sv1.value);
let b=parseFloat(sv2.value);
let pfv=parseFloat(pfSmart.value);

let r,f,s,u;

if(isNaN(a)||isNaN(b)){smartRes.innerText="Enter values";return;}

if(c==="basic"){
if(g==="VI"){r=a*b;f="P=VI";u="W";s=`${a}×${b}`;}
if(g==="VR"){r=a/b;f="I=V/R";u="A";s=`${a}/${b}`;}
if(g==="IR"){r=a*b;f="V=IR";u="V";s=`${a}×${b}`;}
}

if(c==="power"){
if(g==="VI"){r=a*b;f="P=VI";u="W";s=`${a}×${b}`;}
if(g==="IR"){r=a*a*b;f="P=I²R";u="W";s=`${a}²×${b}`;}
if(g==="VR"){r=(a*a)/b;f="P=V²/R";u="W";s=`${a}²/${b}`;}
}

if(c==="eff"){
r=(a/b)*100;f="η=(Output/Input)×100";u="%";s=`(${a}/${b})×100`;
}

if(c==="ac"){
if(isNaN(pfv)){smartRes.innerText="Enter PF";return;}
r=a*b*pfv;f="P=VIcosθ";u="W";s=`${a}×${b}×${pfv}`;
}

if(c==="tr"){
r=a/b;f="V1/V2";u="";s=`${a}/${b}`;
}

smartRes.innerText=`Result: ${r.toFixed(2)} ${u}\nFormula: ${f}\nStep: ${s}=${r.toFixed(2)}`;
}

</script>

</body>
</html>
