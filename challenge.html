<!DOCTYPE html>
<html>
<head>
<title>Challenge - EE Toolkit</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:#0f172a;
  color:white;
  text-align:center;
}

.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:rgba(255,255,255,0.05);
}

.nav-links a{
  margin-left:15px;
  color:white;
  text-decoration:none;
}

.container{
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

input{
  padding:10px;
  border-radius:8px;
  border:none;
  width:200px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  margin-top:10px;
  cursor:pointer;
}

.result{
  margin-top:15px;
  padding:10px;
  background:#020617;
  border-radius:8px;
}
</style>

</head>

<body>

<div class="navbar">
  <div>⚡ EE Toolkit</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="calculations.html">Calculations</a>
    <a href="practice.html">Practice</a>
    <a href="challenge.html">Challenge</a>
    <a href="tools.html">Tools</a>
  </div>
</div>

<div class="container">

<h2>🔥 Daily Challenge Mode</h2>

<div class="card" id="game">

<h3 id="qno">Question 1 / 10</h3>
<h3 id="question">Click Start</h3>

<input id="answer" placeholder="Enter answer">

<br>

<button onclick="start()">Start</button>
<button onclick="submitAns()">Submit</button>

<div class="result" id="feedback"></div>

</div>

<div class="card">
  <h3>🏆 Stats</h3>
  <p>Score: <span id="score">0</span></p>
  <p>Best Score: <span id="best">0</span></p>
  <p>⏱ Time Left: <span id="time">60</span>s</p>
</div>

<div class="card" id="final" style="display:none;">
  <h2>🎉 Challenge Complete</h2>
  <p>Your Score: <span id="finalScore"></span>/10</p>
  <button onclick="restart()">Play Again</button>
</div>

</div>

<script>

let score=0;
let best=0;
let qIndex=0;
let total=10;
let currentAnswer=0;
let timer=60;
let interval;

function start(){
score=0;
qIndex=0;
timer=60;
updateStats();

document.getElementById("final").style.display="none";

clearInterval(interval);
interval=setInterval(()=>{
timer--;
document.getElementById("time").innerText=timer;

if(timer<=0){
endGame();
}
},1000);

nextQ();
}

function nextQ(){

if(qIndex>=total){
endGame();
return;
}

qIndex++;

document.getElementById("qno").innerText=`Question ${qIndex} / ${total}`;

let type=Math.floor(Math.random()*4);

let q,a;

if(type===0){
let V=Math.floor(Math.random()*100)+10;
let R=Math.floor(Math.random()*10)+1;
a=V/R;
q=`Find Current: V=${V}V, R=${R}Ω`;
}

if(type===1){
let I=Math.floor(Math.random()*10)+1;
let R=Math.floor(Math.random()*10)+1;
a=I*R;
q=`Find Voltage: I=${I}A, R=${R}Ω`;
}

if(type===2){
let V=Math.floor(Math.random()*100)+10;
let I=Math.floor(Math.random()*10)+1;
a=V*I;
q=`Find Power: V=${V}V, I=${I}A`;
}

if(type===3){
let P=Math.floor(Math.random()*500)+50;
let t=Math.floor(Math.random()*5)+1;
a=P*t;
q=`Find Energy: P=${P}W, t=${t}hr`;
}

currentAnswer=a.toFixed(2);

document.getElementById("question").innerText=q;
document.getElementById("answer").value="";
document.getElementById("feedback").innerText="";
}

function submitAns(){

let user=parseFloat(document.getElementById("answer").value);

if(isNaN(user)){
feedback.innerText="Enter valid number";
return;
}

if(Math.abs(user-currentAnswer)<0.1){
score++;
feedback.innerText="✅ Correct!";
}
else{
feedback.innerText=`❌ Correct: ${currentAnswer}`;
}

updateStats();

setTimeout(()=>{
nextQ();
},800);
}

function updateStats(){
document.getElementById("score").innerText=score;
document.getElementById("best").innerText=best;
}

function endGame(){
clearInterval(interval);

if(score>best) best=score;

document.getElementById("finalScore").innerText=score;

document.getElementById("final").style.display="block";
}

function restart(){
start();
}

</script>

</body>
</html>
