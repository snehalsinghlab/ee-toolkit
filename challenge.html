<!DOCTYPE html>
<html>
<head>
<title>Challenge - EE Toolkit</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:#0f172a;
  color:white;
  text-align:center;
}

.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:rgba(255,255,255,0.05);
}

.nav-links a{
  margin-left:15px;
  color:white;
  text-decoration:none;
}

.container{
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

input, select{
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  margin-top:10px;
  cursor:pointer;
}

.result{
  margin-top:10px;
  padding:10px;
  background:#020617;
  border-radius:8px;
}
</style>

</head>

<body>

<div class="navbar">
  <div>⚡ EE Toolkit</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="calculations.html">Calculations</a>
    <a href="practice.html">Practice</a>
    <a href="challenge.html">Challenge</a>
  </div>
</div>

<div class="container">

<h2>🔥 Challenge Mode</h2>

<div class="card">

<select id="difficulty">
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard">Hard</option>
</select>

<h3 id="qno">Question 1 / 10</h3>
<h3 id="question">Click Start</h3>

<input id="answer" placeholder="Enter answer">

<br>

<button onclick="start()">Start</button>
<button onclick="submitAns()">Submit</button>

<div class="result" id="feedback"></div>

</div>

<div class="card">
  <h3>🏆 Stats</h3>
  <p>Score: <span id="score">0</span></p>
  <p>Best Score: <span id="best">0</span></p>
  <p>🔥 Streak: <span id="streak">0</span></p>
  <p>⏱ Time Left: <span id="time">60</span>s</p>
</div>

<div class="card">
  <h3>🏆 Leaderboard</h3>
  <ul id="leaderboard"></ul>
</div>

<div class="card" id="final" style="display:none;">
  <h2>🎉 Challenge Complete</h2>
  <p>Your Score: <span id="finalScore"></span>/10</p>
  <p id="message"></p>
  <button onclick="restart()">Play Again</button>
</div>

</div>

<script>

let score=0, best=0, streak=0;
let qIndex=0, total=10;
let currentAnswer=0;
let timer=60;
let interval;

// LOAD DATA
if(localStorage.getItem("best")) best=parseInt(localStorage.getItem("best"));
if(localStorage.getItem("streak")) streak=parseInt(localStorage.getItem("streak"));

updateStats();
loadLeaderboard();

function start(){
score=0;
qIndex=0;
timer=60;
updateStats();

document.getElementById("final").style.display="none";

clearInterval(interval);
interval=setInterval(()=>{
timer--;
time.innerText=timer;

if(timer<=0) endGame();
},1000);

nextQ();
}

function nextQ(){

if(qIndex>=total){
endGame();
return;
}

qIndex++;
qno.innerText=`Question ${qIndex} / ${total}`;

let diff=document.getElementById("difficulty").value;
let range = diff==="easy"?20:diff==="medium"?50:100;

let type=Math.floor(Math.random()*4);

let q,a;

if(type===0){
let V=Math.floor(Math.random()*range)+10;
let R=Math.floor(Math.random()*10)+1;
a=V/R;
q=`Find Current: V=${V}V, R=${R}Ω`;
}

if(type===1){
let I=Math.floor(Math.random()*10)+1;
let R=Math.floor(Math.random()*10)+1;
a=I*R;
q=`Find Voltage: I=${I}A, R=${R}Ω`;
}

if(type===2){
let V=Math.floor(Math.random()*range)+10;
let I=Math.floor(Math.random()*10)+1;
a=V*I;
q=`Find Power: V=${V}V, I=${I}A`;
}

if(type===3){
let P=Math.floor(Math.random()*500)+50;
let t=Math.floor(Math.random()*5)+1;
a=P*t;
q=`Find Energy: P=${P}W, t=${t}hr`;
}

currentAnswer=a.toFixed(2);

question.innerText=q;
answer.value="";
feedback.innerText="";
}

function submitAns(){

let user=parseFloat(answer.value);

if(isNaN(user)){
feedback.innerText="Enter valid number";
return;
}

if(Math.abs(user-currentAnswer)<0.1){
score++;
feedback.innerText="✅ Correct!";
}
else{
feedback.innerText=`❌ Correct: ${currentAnswer}`;
}

updateStats();

setTimeout(()=>{
nextQ();
},600);
}

function updateStats(){
scoreSpan = document.getElementById("score");
bestSpan = document.getElementById("best");
streakSpan = document.getElementById("streak");

scoreSpan.innerText=score;
bestSpan.innerText=best;
streakSpan.innerText=streak;
}

function endGame(){
clearInterval(interval);

if(score>best){
best=score;
localStorage.setItem("best",best);
}

if(score>=7){
streak++;
localStorage.setItem("streak",streak);
}
else{
streak=0;
localStorage.setItem("streak",streak);
}

saveLeaderboard(score);

finalScore.innerText=score;

let msg = score>=8?"🔥 Excellent!":
          score>=5?"👍 Good job!":
          "😅 Try again!";

message.innerText=msg;

document.getElementById("final").style.display="block";

updateStats();
loadLeaderboard();
}

function restart(){
start();
}

function saveLeaderboard(score){
let lb = JSON.parse(localStorage.getItem("lb")) || [];
lb.push(score);
lb.sort((a,b)=>b-a);
lb = lb.slice(0,5);
localStorage.setItem("lb",JSON.stringify(lb));
}

function loadLeaderboard(){
let lb = JSON.parse(localStorage.getItem("lb")) || [];
let list = document.getElementById("leaderboard");

list.innerHTML="";

lb.forEach((s,i)=>{
let li=document.createElement("li");
li.innerText=`${i+1}. Score: ${s}`;
list.appendChild(li);
});
}

</script>

</body>
</html>
